<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logo — Alex Wholesale</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange:  #F56200;
      --black:   #0a0a0a;
      --dark:    #111111;
      --mid:     #1e1e1e;
      --border:  rgba(255,255,255,0.08);
      --muted:   #666;
      --white:   #f5f3ef;
      --font-display: 'Bebas Neue', sans-serif;
      --font-body:    'Jost', sans-serif;
    }

    body {
      background: var(--dark);
      color: var(--white);
      font-family: var(--font-body);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.25rem;
      gap: 2.5rem;
    }

    /* ── Header ── */
    .page-header {
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    .page-header__eyebrow {
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--orange);
    }
    .page-header__title {
      font-family: var(--font-display);
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      letter-spacing: 0.04em;
      line-height: 1;
    }
    .page-header__sub {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 0.2rem;
    }

    /* ── Canvas preview card ── */
    .canvas-card {
      background: var(--mid);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.75rem;
      width: 100%;
      max-width: 520px;
    }

    .canvas-wrap {
      background: var(--black);
      border-radius: 3px;
      padding: 2rem 2.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
    }

    canvas { display: block; max-width: 100%; height: auto; }

    /* ── Variant toggles ── */
    .variants {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .variant-btn {
      font-family: var(--font-body);
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.4rem 0.9rem;
      border: 1px solid var(--border);
      border-radius: 2px;
      background: none;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
    }
    .variant-btn:hover { border-color: var(--orange); color: var(--orange); }
    .variant-btn.active { background: var(--orange); border-color: var(--orange); color: #fff; }

    /* ── Download buttons ── */
    .download-row {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      justify-content: center;
      width: 100%;
    }
    .dl-btn {
      flex: 1;
      min-width: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.75rem 1rem;
      border-radius: 2px;
      font-family: var(--font-body);
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      border: 1px solid var(--border);
    }
    .dl-btn--primary { background: var(--orange); color: #fff; border-color: var(--orange); }
    .dl-btn--primary:hover { background: #c24d00; }
    .dl-btn--ghost { background: none; color: var(--white); }
    .dl-btn--ghost:hover { border-color: var(--white); }

    /* ── Specs ── */
    .specs {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .spec { text-align: center; }
    .spec__val { font-family: var(--font-display); font-size: 1.1rem; color: var(--orange); display: block; }
    .spec__label { font-size: 0.6rem; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }

    /* ── Back link ── */
    .back-link {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--orange); }
  </style>
</head>
<body>

  <div class="page-header">
    <p class="page-header__eyebrow">Brand Assets</p>
    <h1 class="page-header__title">ALEX WHL Logo</h1>
    <p class="page-header__sub">Select a variant and download as PNG</p>
  </div>

  <div class="canvas-card">

    <!-- variant toggles -->
    <div class="variants">
      <button class="variant-btn active" data-variant="dark">Dark</button>
      <button class="variant-btn" data-variant="light">Light</button>
      <button class="variant-btn" data-variant="orange">Orange</button>
      <button class="variant-btn" data-variant="mono-white">Mono White</button>
      <button class="variant-btn" data-variant="mono-black">Mono Black</button>
      <button class="variant-btn" data-variant="transparent">Transparent</button>
    </div>

    <!-- canvas preview -->
    <div class="canvas-wrap" id="canvasWrap">
      <canvas id="logoCanvas" width="600" height="160"></canvas>
    </div>

    <!-- specs -->
    <div class="specs">
      <div class="spec"><span class="spec__val">600px</span><span class="spec__label">Width</span></div>
      <div class="spec"><span class="spec__val">160px</span><span class="spec__label">Height</span></div>
      <div class="spec"><span class="spec__val">PNG</span><span class="spec__label">Format</span></div>
      <div class="spec"><span class="spec__val">4×</span><span class="spec__label">Retina</span></div>
    </div>

    <!-- download buttons -->
    <div class="download-row">
      <button class="dl-btn dl-btn--primary" id="dlPng">↓ Download PNG</button>
      <button class="dl-btn dl-btn--ghost" id="dlPng2x">↓ Download 2× PNG</button>
    </div>

  </div>

  <a href="index.html" class="back-link">← Back to Home</a>

  <script>
    // Wait for Bebas Neue to load before drawing
    document.fonts.ready.then(() => {
      init();
    });

    const VARIANTS = {
      'dark':        { bg: '#0a0a0a',  primary: '#f5f3ef', accent: '#F56200', transparent: false },
      'light':       { bg: '#f5f3ef',  primary: '#0a0a0a', accent: '#F56200', transparent: false },
      'orange':      { bg: '#F56200',  primary: '#ffffff',  accent: '#ffffff',  transparent: false },
      'mono-white':  { bg: '#0a0a0a',  primary: '#ffffff',  accent: '#ffffff',  transparent: false },
      'mono-black':  { bg: '#f5f3ef',  primary: '#0a0a0a',  accent: '#0a0a0a',  transparent: false },
      'transparent': { bg: null,       primary: '#f5f3ef', accent: '#F56200', transparent: true  },
    };

    let currentVariant = 'dark';

    function init() {
      drawLogo(currentVariant);
      bindEvents();
    }

    // ── Compute tight canvas dimensions from actual text metrics ──
    function drawLogo(variant) {
      const { bg, primary, accent, transparent } = VARIANTS[variant];
      const canvas = document.getElementById('logoCanvas');

      // ── Step 1: measure on a throw-away canvas to get content width ──
      const fontSize = 92;
      const pad      = 24;
      const H        = 148;

      const tmp  = document.createElement('canvas');
      tmp.width  = 1200;
      tmp.height = H;
      const tctx = tmp.getContext('2d');

      tctx.font         = `${fontSize}px 'Bebas Neue', sans-serif`;
      tctx.letterSpacing = '4px';
      tctx.textBaseline  = 'middle';
      const alexW = tctx.measureText('ALEX').width;
      const whlW  = tctx.measureText('WHL').width;
      const gap   = 3;
      const textW = alexW + gap + whlW;

      tctx.font         = `500 13px 'Jost', sans-serif`;
      tctx.letterSpacing = '6px';
      const tagW  = tctx.measureText('WHOLESALE').width;

      const contentW = Math.max(textW, tagW);
      const W        = Math.ceil(contentW + pad * 2);

      // ── Step 2: set canvas to tight dimensions ──
      canvas.width  = W;
      canvas.height = H;
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, W, H);

      // Background (skip for transparent)
      if (!transparent) {
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, W, H);
      }

      // ── Step 3: re-measure on actual ctx after resize (context reset) ──
      ctx.font         = `${fontSize}px 'Bebas Neue', sans-serif`;
      ctx.letterSpacing = '4px';
      ctx.textBaseline  = 'middle';
      const alexWr = ctx.measureText('ALEX').width;
      const whlWr  = ctx.measureText('WHL').width;
      const textWr = alexWr + gap + whlWr;

      ctx.font         = `500 13px 'Jost', sans-serif`;
      ctx.letterSpacing = '6px';
      const tagWr  = ctx.measureText('WHOLESALE').width;

      // Center based on re-measured values
      const startX = Math.round((W - textWr) / 2);
      const tagX   = Math.round((W - tagWr)  / 2);
      const midY   = Math.round(H / 2) - 10;

      // Tagline
      ctx.font         = `500 13px 'Jost', sans-serif`;
      ctx.letterSpacing = '6px';
      ctx.textBaseline  = 'middle';
      if (variant === 'light' || variant === 'mono-black') {
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
      } else {
        ctx.fillStyle = 'rgba(245,243,239,0.3)';
      }
      ctx.fillText('WHOLESALE', tagX, midY + 52);

      // Separator line
      ctx.strokeStyle  = accent;
      ctx.lineWidth    = 1.5;
      ctx.globalAlpha  = 0.5;
      ctx.beginPath();
      ctx.moveTo(startX, midY + 34);
      ctx.lineTo(startX + textWr, midY + 34);
      ctx.stroke();
      ctx.globalAlpha  = 1;

      // Main logo text
      ctx.font         = `${fontSize}px 'Bebas Neue', sans-serif`;
      ctx.letterSpacing = '4px';
      ctx.textBaseline  = 'middle';

      ctx.fillStyle = primary;
      ctx.fillText('ALEX', startX, midY);

      ctx.fillStyle = accent;
      ctx.fillText('WHL', startX + alexWr + gap, midY);

      // Update preview background
      if (transparent) {
        document.getElementById('canvasWrap').style.background =
          'repeating-conic-gradient(#2a2a2a 0% 25%, #1a1a1a 0% 50%) 0 0 / 16px 16px';
      } else if (variant === 'light' || variant === 'mono-black') {
        document.getElementById('canvasWrap').style.background = '#e8e6e2';
      } else {
        document.getElementById('canvasWrap').style.background = '#0a0a0a';
      }

      // Update specs display
      document.querySelector('.spec__val').textContent = W + 'px';
    }

    function bindEvents() {
      // Variant buttons
      document.querySelectorAll('.variant-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.variant-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          currentVariant = btn.dataset.variant;
          drawLogo(currentVariant);
        });
      });

      // Download 1x
      document.getElementById('dlPng').addEventListener('click', () => {
        download(1);
      });

      // Download 2x (retina)
      document.getElementById('dlPng2x').addEventListener('click', () => {
        download(2);
      });
    }

    function download(scale) {
      const source = document.getElementById('logoCanvas');
      const { bg, primary, accent, transparent } = VARIANTS[currentVariant];

      const fontSize = 92;
      const gap      = 3;
      const H        = source.height;
      const W        = source.width;

      const offscreen = document.createElement('canvas');
      offscreen.width  = W * scale;
      offscreen.height = H * scale;
      const ctx = offscreen.getContext('2d');
      ctx.scale(scale, scale);

      ctx.clearRect(0, 0, W, H);
      if (!transparent) {
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, W, H);
      }

      // Measure on this context after scale
      ctx.font         = `${fontSize}px 'Bebas Neue', sans-serif`;
      ctx.letterSpacing = '4px';
      ctx.textBaseline  = 'middle';
      const alexW = ctx.measureText('ALEX').width;
      const whlW  = ctx.measureText('WHL').width;
      const textW = alexW + gap + whlW;

      ctx.font         = `500 13px 'Jost', sans-serif`;
      ctx.letterSpacing = '6px';
      const tagW  = ctx.measureText('WHOLESALE').width;

      const startX = Math.round((W - textW) / 2);
      const tagX   = Math.round((W - tagW)  / 2);
      const midY   = Math.round(H / 2) - 10;

      // Tagline
      ctx.textBaseline  = 'middle';
      ctx.fillStyle    = (currentVariant === 'light' || currentVariant === 'mono-black')
        ? 'rgba(0,0,0,0.3)' : 'rgba(245,243,239,0.3)';
      ctx.fillText('WHOLESALE', tagX, midY + 52);

      // Line
      ctx.strokeStyle  = accent;
      ctx.lineWidth    = 1.5;
      ctx.globalAlpha  = 0.5;
      ctx.beginPath();
      ctx.moveTo(startX, midY + 34);
      ctx.lineTo(startX + textW, midY + 34);
      ctx.stroke();
      ctx.globalAlpha  = 1;

      // Main text
      ctx.font         = `${fontSize}px 'Bebas Neue', sans-serif`;
      ctx.letterSpacing = '4px';
      ctx.textBaseline  = 'middle';
      ctx.fillStyle    = primary;
      ctx.fillText('ALEX', startX, midY);
      ctx.fillStyle    = accent;
      ctx.fillText('WHL', startX + alexW + gap, midY);

      const link = document.createElement('a');
      link.download = `alexwhl-logo-${currentVariant}${scale > 1 ? '@' + scale + 'x' : ''}.png`;
      link.href = offscreen.toDataURL('image/png');
      link.click();
    }
  </script>

</body>
</html>
