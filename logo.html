<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logo — BIMP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange:  #F56200;
      --black:   #0a0a0a;
      --dark:    #111111;
      --mid:     #1e1e1e;
      --border:  rgba(255,255,255,0.08);
      --muted:   #666;
      --white:   #f5f3ef;
      --font-logo: 'Comfortaa', sans-serif;
      --font-body: 'Jost', sans-serif;
    }

    body {
      background: var(--dark);
      color: var(--white);
      font-family: var(--font-body);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.25rem;
      gap: 2.5rem;
    }

    .page-header {
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    .page-header__eyebrow {
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--orange);
    }
    .page-header__title {
      font-family: var(--font-logo);
      font-weight: 700;
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      line-height: 1;
    }
    .page-header__sub {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 0.2rem;
    }

    .canvas-card {
      background: var(--mid);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.75rem;
      width: 100%;
      max-width: 520px;
    }

    .canvas-wrap {
      background: var(--black);
      border-radius: 3px;
      padding: 2rem 2.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
    }

    canvas { display: block; max-width: 100%; height: auto; }

    .variants {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .variant-btn {
      font-family: var(--font-body);
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.4rem 0.9rem;
      border: 1px solid var(--border);
      border-radius: 2px;
      background: none;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
    }
    .variant-btn:hover { border-color: var(--orange); color: var(--orange); }
    .variant-btn.active { background: var(--orange); border-color: var(--orange); color: #fff; }

    .download-row {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      justify-content: center;
      width: 100%;
    }
    .dl-btn {
      flex: 1;
      min-width: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.75rem 1rem;
      border-radius: 2px;
      font-family: var(--font-body);
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      border: 1px solid var(--border);
    }
    .dl-btn--primary { background: var(--orange); color: #fff; border-color: var(--orange); }
    .dl-btn--primary:hover { background: #c24d00; }
    .dl-btn--ghost { background: none; color: var(--white); }
    .dl-btn--ghost:hover { border-color: var(--white); }

    .specs {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .spec { text-align: center; }
    .spec__val { font-family: var(--font-logo); font-size: 1.1rem; color: var(--orange); display: block; }
    .spec__label { font-size: 0.6rem; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }

    .back-link {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--orange); }
  </style>
</head>
<body>

  <div class="page-header">
    <p class="page-header__eyebrow">Brand Assets</p>
    <h1 class="page-header__title">bimp</h1>
    <p class="page-header__sub">Select a variant and download as PNG</p>
  </div>

  <div class="canvas-card">

    <div class="variants">
      <button class="variant-btn active" data-variant="dark">Dark</button>
      <button class="variant-btn" data-variant="light">Light</button>
      <button class="variant-btn" data-variant="orange">Orange</button>
      <button class="variant-btn" data-variant="mono-white">Mono White</button>
      <button class="variant-btn" data-variant="mono-black">Mono Black</button>
      <button class="variant-btn" data-variant="transparent">Transparent</button>
    </div>

    <div class="canvas-wrap" id="canvasWrap">
      <canvas id="logoCanvas" width="300" height="100"></canvas>
    </div>

    <div class="specs">
      <div class="spec"><span class="spec__val" id="specW">—</span><span class="spec__label">Width</span></div>
      <div class="spec"><span class="spec__val">100px</span><span class="spec__label">Height</span></div>
      <div class="spec"><span class="spec__val">PNG</span><span class="spec__label">Format</span></div>
      <div class="spec"><span class="spec__val">2×</span><span class="spec__label">Retina</span></div>
    </div>

    <div class="download-row">
      <button class="dl-btn dl-btn--primary" id="dlPng">↓ Download PNG</button>
      <button class="dl-btn dl-btn--ghost" id="dlPng2x">↓ Download 2× PNG</button>
    </div>

  </div>

  <a href="index.html" class="back-link">← Back to Home</a>

  <script>
    const VARIANTS = {
      'dark':        { bg: '#0a0a0a',  color: '#ffffff', transparent: false },
      'light':       { bg: '#f5f3ef',  color: '#0a0a0a', transparent: false },
      'orange':      { bg: '#F56200',  color: '#ffffff', transparent: false },
      'mono-white':  { bg: '#0a0a0a',  color: '#ffffff', transparent: false },
      'mono-black':  { bg: '#f5f3ef',  color: '#0a0a0a', transparent: false },
      'transparent': { bg: null,       color: '#ffffff', transparent: true  },
    };

    let currentVariant = 'dark';
    const FONT_SIZE = 72;
    const PAD_X = 0;
    const PAD_Y = 4; // minimal vertical breathing room only

    document.fonts.ready.then(() => {
      drawLogo(currentVariant);
      bindEvents();
    });

    function measureText(ctx) {
      ctx.font = `700 ${FONT_SIZE}px 'Comfortaa', sans-serif`;
      ctx.letterSpacing = '0px';
      const m = ctx.measureText('bimp');
      const w = Math.ceil(m.width);
      const asc  = Math.ceil(m.actualBoundingBoxAscent);
      const desc = Math.ceil(m.actualBoundingBoxDescent);
      const h = asc + desc + PAD_Y * 2;
      return { w, asc, desc, h };
    }

    function drawLogo(variant) {
      const { bg, color, transparent } = VARIANTS[variant];
      const canvas = document.getElementById('logoCanvas');

      // Measure on a temp context first
      const tmp = document.createElement('canvas');
      tmp.width = 600; tmp.height = 200;
      const tctx = tmp.getContext('2d');
      const { w, asc, desc, h } = measureText(tctx);

      canvas.width  = w;
      canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, w, h);

      if (!transparent) {
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, w, h);
      }

      ctx.font = `700 ${FONT_SIZE}px 'Comfortaa', sans-serif`;
      ctx.letterSpacing = '0px';
      ctx.textBaseline = 'alphabetic';
      ctx.fillStyle = color;
      ctx.fillText('bimp', 0, PAD_Y + asc);

      // Preview bg
      if (transparent) {
        document.getElementById('canvasWrap').style.background =
          'repeating-conic-gradient(#2a2a2a 0% 25%, #1a1a1a 0% 50%) 0 0 / 16px 16px';
      } else if (variant === 'light' || variant === 'mono-black') {
        document.getElementById('canvasWrap').style.background = '#e8e6e2';
      } else {
        document.getElementById('canvasWrap').style.background = '#0a0a0a';
      }

      document.getElementById('specW').textContent = w + 'px';
    }

    function drawOffscreen(variant, scale) {
      const { bg, color, transparent } = VARIANTS[variant];

      const tmp = document.createElement('canvas');
      tmp.width = 600; tmp.height = 200;
      const tctx = tmp.getContext('2d');
      const { w, asc, desc, h } = measureText(tctx);

      const off = document.createElement('canvas');
      off.width  = w * scale;
      off.height = h * scale;
      const ctx = off.getContext('2d');
      ctx.scale(scale, scale);

      if (!transparent) {
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, w, h);
      }

      ctx.font = `700 ${FONT_SIZE}px 'Comfortaa', sans-serif`;
      ctx.letterSpacing = '0px';
      ctx.textBaseline = 'alphabetic';
      ctx.fillStyle = color;
      ctx.fillText('bimp', 0, PAD_Y + asc);

      return off;
    }

    function bindEvents() {
      document.querySelectorAll('.variant-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.variant-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          currentVariant = btn.dataset.variant;
          drawLogo(currentVariant);
        });
      });

      document.getElementById('dlPng').addEventListener('click', () => {
        const off = drawOffscreen(currentVariant, 1);
        const a = document.createElement('a');
        a.download = `bimp-logo-${currentVariant}.png`;
        a.href = off.toDataURL('image/png');
        a.click();
      });

      document.getElementById('dlPng2x').addEventListener('click', () => {
        const off = drawOffscreen(currentVariant, 2);
        const a = document.createElement('a');
        a.download = `bimp-logo-${currentVariant}@2x.png`;
        a.href = off.toDataURL('image/png');
        a.click();
      });
    }
  </script>

</body>
</html>
